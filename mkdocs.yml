# PYTHONPATH=. poetry run mkdocs serve

site_name: Chalkboard OCR Classification Kit
site_description: Документация проекта Chalkboard-OCR-Classification-Kit
site_author: ProudRykar

theme:
  custom_dir: docs/custom_theme
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tabs
    - content.code.copy
    - palette.toggle
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Включить тёмную тему
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/white-balance-sunny
        name: Включить светлую тему

nav:
  - Главная: index.md
  - Core:
      - Domain:
          - Models:
              - User: core/domain/models/user.md
              - Image: core/domain/models/image.md
      - Services:
          - User Service: core/services/user_service.md
          - Auth Service: core/services/auth_service.md
          - Security Service: core/services/security_service.md
          - Validation Service: core/services/validation_service.md
      - Errors:
          - Auth Errors: core/errors/auth.md
          - User Errors: core/errors/user.md
          - Security Errors: core/errors/security.md
          - Validation Errors: core/errors/validation.md
  - API:
      - Routers:
          - Auth: api/routers/auth.md
          - User: api/routers/user.md
          - Health: api/routers/health.md
      - Schemas:
          - User DTO: api/schemas/user_dto.md
          - Image DTO: api/schemas/image_dto.md
  - Adapters:
      - Gateways:
          - Mongo Gateway: adapters/gateways/mongo.md
          - Minio Gateway: adapters/gateways/s3.md
      - Repositories:
          - Abstract Repository: adapters/repositories/abc_repo.md
          - Mongo Repository: adapters/repositories/mongo_repo.md
          - User Repository: adapters/repositories/user_repo.md
          - Image Repository: adapters/repositories/image_repo.md
      - Interfaces:
          - Database Interface: adapters/interfaces/db.md
          - Minio Interface: adapters/interfaces/s3.md
  - Main: main.md
  - Container: container.md
  - Config: config.md
  - Тесты: tests/in_work.md
  - Скрипты: scripts/clean_project.md
  - Утилиты: utils/generate_docs.md
  - Диаграммы:
      - Обзор: diagrams/diagrams.md
      - Бизнес-логика: diagrams/business_logic_diagram.png
      - Техническая архитектура: diagrams/tech_architecture_diagram.png

plugins:
  - search
  - glightbox
  - mkdocstrings:
      handlers:
        python:
          paths:
            - app
            - .
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            show_category_heading: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      linenums: false
      guess_lang: false
      use_pygments: true
      pygments_style: default
  - pymdownx.superfences
  - pymdownx.blocks.caption

watch:
  - app
  - docs

extra_css:
  - custom_theme/assets/stylesheets/extra.css