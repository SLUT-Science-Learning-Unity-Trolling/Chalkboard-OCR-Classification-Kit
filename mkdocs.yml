# PYTHONPATH=. poetry run mkdocs serve

site_name: Chalkboard OCR Classification Kit
site_description: Документация проекта Chalkboard-OCR-Classification-Kit
site_author: ProudRykar

theme:
  custom_dir: docs/custom_theme
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tabs
    - content.code.copy
    - palette.toggle
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Включить тёмную тему
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/white-balance-sunny
        name: Включить светлую тему

nav:
  - Главная: index.md
  - Core:
      - Domain:
          - Models:
              - User: core/domain/models/user.md
              - Image: core/domain/models/image.md
              - Token: core/domain/models/token.md
      - Services:
          - User Service: core/services/user_service.md
          - Auth Service: core/services/auth_service.md
          - Security Service: core/services/security_service.md
          - Validation Service: core/services/validation_service.md
          - OCR Service: core/services/ocr_service.md
      - Errors:
          - Auth Errors: core/errors/auth.md
          - User Errors: core/errors/user.md
          - Security Errors: core/errors/security.md
          - Validation Errors: core/errors/validation.md
      - Middleware:
          - API Monitoring: core/middleware/api_monitoring.md
          - Paseto Refresh: core/middleware/paseto_refresh.md
          - Rate Limit: core/middleware/rate_limit.md
      - Utils:
          - Utils: core/utils/utils.md
  - API:
      - Routers:
          - Auth: api/routers/auth.md
          - User: api/routers/user.md
          - Health: api/routers/health.md
          - OCR: api/routers/ocr.md
      - Schemas:
          - User DTO: api/schemas/user_dto.md
          - Image DTO: api/schemas/image_dto.md
      - Exceptions:
          - Handlers: api/exceptions/handlers.md
          - Problem Details DTO: api/exceptions/problem_details_dto.md
          - Problem Factory: api/exceptions/problem_factory.md
  - Adapters:
      - Engines:
          - Doctr Engine: adapters/engines/doctr_engine.md
          - EasyOCR Engine: adapters/engines/easy_ocr_engine.md
          - Paddle Engine: adapters/engines/paddle_engine.md
          - Pix2Text Engine: adapters/engines/pix2text_engine.md
          - RapidOCR: adapters/engines/rapidocr.md
          - Tesseract Engine: adapters/engines/tesseract_engine.md
      - Gateways:
          - Mongo Gateway: adapters/gateways/mongo.md
          - Minio Gateway: adapters/gateways/s3.md
          - Redis Gateway: adapters/gateways/redis.md
      - Repositories:
          - Abstract Repository: adapters/repositories/abc_repo.md
          - Mongo Repository: adapters/repositories/mongo_repo.md
          - User Repository: adapters/repositories/user_repo.md
          - Image Repository: adapters/repositories/image_repo.md
          - Redis Blacklist Repository: adapters/repositories/redis_blacklist_repo.md
          - Redis RateLimit Repository: adapters/repositories/redis_rate_limit_repo.md
      - Interfaces:
          - Database Interface: adapters/interfaces/db.md
          - OCR Engine Interface: adapters/interfaces/ocr_engine.md
          - Minio Interface: adapters/interfaces/s3.md
  - Monitoring:
      - API Monitor: monitoring/api_monitor.md
      - Graphs: monitoring/graphs.md
      - OCR Correction: monitoring/ocr_correction.md
      - Prometheus: monitoring/prometheus.md
      - Prometheus Middleware: monitoring/prometheus_middleware.md
      - Prometheus Mongo: monitoring/prometheus_mongo.md
      - Prometheus Redis: monitoring/prometheus_redis.md
  - Main: main.md
  - Container: container.md
  - Config: config.md
  - Тесты: in_work.md
  - Скрипты: scripts/clean_project.md
  - Утилиты: utils/generate_docs.md
  - Диаграммы:
      - Обзор: diagrams/diagrams.md
      - Бизнес-логика: diagrams/business_logic_diagram.png
      - Техническая архитектура: diagrams/tech_architecture_diagram.png
      - Отчёт по метрикам: diagrams/отчёт.md
      - Диаграммы метрик: diagrams/metrics_diagram.png

plugins:
  - search
  - glightbox
  - mkdocstrings:
      handlers:
        python:
          paths:
            - app
            - .
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            show_category_heading: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      linenums: false
      guess_lang: false
      use_pygments: true
      pygments_style: default
  - pymdownx.superfences
  - pymdownx.blocks.caption

watch:
  - app
  - docs

extra_css:
  - custom_theme/assets/stylesheets/extra.css