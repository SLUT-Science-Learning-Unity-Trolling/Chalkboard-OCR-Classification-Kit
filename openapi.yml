openapi: 3.0.3

info:
  title: My API
  version: 1.0.0
  description: |
    API сервиса с авторизацией, пользователями, OCR и health-check.

servers:
  - url: http://localhost:8000

tags:
  - name: Auth
  - name: Users
  - name: OCR
  - name: Health

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: JWT токен в HTTP-only cookie

  schemas:
    UserLoginDTO:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          example: user@example.com
        password:
          type: string
          example: password123

    UserDTO:
      type: object
      properties:
        id:
          type: string
          example: 694de2b36e5be2ab74f350e6
        username:
          type: string
          example: User123
        email:
          type: string
          example: user@example.com

    ProblemDetailsDTO:
      type: object
      properties:
        type:
          type: string
          example: https://example.com/problem
        title:
          type: string
          example: Ошибка
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: Описание ошибки

    ImageDTO:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        created_at:
          type: string
          format: date-time

paths:

  /auth/login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginDTO'
      responses:
        '200':
          description: Пользователь авторизован
          headers:
            Set-Cookie:
              description: JWT токен
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Невалидные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsDTO'
        '401':
          description: Неверные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsDTO'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsDTO'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выход из аккаунта
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Пользователь успешно вышел

  /me:
    get:
      tags: [Auth]
      summary: Получить текущего пользователя
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Пользователь авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '401':
          description: Пользователь не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsDTO'

  /users/create:
    post:
      tags: [Users]
      summary: Создание пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateDTO'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsDTO'

  /users/upload_image:
    post:
      tags: [Users]
      summary: Загрузка изображения
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Изображение загружено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageDTO'

  /users/get_all_user_images:
    get:
      tags: [Users]
      summary: Получить все изображения пользователя
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Список изображений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageDTO'

  /users/delete_image:
    delete:
      tags: [Users]
      summary: Удаление изображения
      security:
        - cookieAuth: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Изображение удалено

  /users/ocr/pdf:
    post:
      tags: [OCR]
      summary: OCR изображения в PDF
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: PDF файл
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /health/server:
    get:
      tags: [Health]
      summary: Проверка сервера
      responses:
        '200':
          description: OK

  /health/db:
    get:
      tags: [Health]
      summary: Проверка MongoDB
      responses:
        '200':
          description: MongoDB подключена
        '500':
          description: Ошибка подключения

  /health/minio:
    get:
      tags: [Health]
      summary: Проверка MinIO
      responses:
        '200':
          description: MinIO подключен
        '500':
          description: Ошибка подключения
